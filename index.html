<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorado Interactive Map - Timeline</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h1 {
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            text-align: center;
        }

        #map {
            height: 600px;
            width: 100%;
        }

        .timeline-container {
            background-color: white;
            padding: 30px;
            border-top: 2px solid #3498db;
            overflow-x: auto;
        }

        .timeline {
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-width: min-content;
            padding: 20px 0;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #bdc3c7;
            z-index: 1;
        }

        .timeline-item {
            position: relative;
            z-index: 2;
            text-align: center;
            cursor: pointer;
            padding: 10px 20px;
            margin: 0 10px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .timeline-item .dot {
            width: 16px;
            height: 16px;
            background-color: white;
            border: 3px solid #bdc3c7;
            border-radius: 50%;
            margin: 0 auto 10px;
            transition: all 0.3s ease;
        }

        .timeline-item:hover .dot {
            border-color: #3498db;
            transform: scale(1.3);
        }

        .timeline-item.active .dot {
            background-color: #e74c3c;
            border-color: #e74c3c;
            transform: scale(1.4);
        }

        .timeline-item .year {
            font-weight: bold;
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .timeline-item .event {
            font-size: 12px;
            color: #7f8c8d;
            max-width: 100px;
            word-wrap: break-word;
        }

        .timeline-item:hover .year {
            color: #3498db;
        }

        .timeline-item.active .year {
            color: #e74c3c;
        }

        .timeline-item.active .event {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Colorado History Interactive Map</h1>
    <div id="map"></div>
    
    <div class="timeline-container">
        <div class="timeline" id="timeline"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the map
        var map = L.map('map').setView([39.5501, -105.7821], 7);

        // Add a tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // Define marker locations with historical dates
        var locations = [
            {
                name: "Denver",
                description: "Gold rush settlement founded in 1858. Colorado's capital city.",
                image: "https://example.com/images/denver.jpg",
                coords: [39.7392, -104.9903],
                foundingYear: 1858
            },
            {
                name: "Boulder",
                description: "Founded in 1859 during the gold rush. Known for scenic outdoor activities.",
                image: "https://example.com/images/boulder.jpg",
                coords: [40.0150, -105.2705],
                foundingYear: 1859
            },
            {
                name: "Rocky Mountain National Park",
                description: "Established as a National Park in 1915. A stunning park with breathtaking views.",
                image: "https://example.com/images/rocky_mountain.jpg",
                coords: [40.3428, -105.6836],
                foundingYear: 1915
            }
        ];

        // Define historical timeline events
        var timelineEvents = [
            {
                year: 1850,
                event: "Early Settlement",
                relatedLocations: []
            },
            {
                year: 1858,
                event: "Denver Founded",
                relatedLocations: [0]
            },
            {
                year: 1859,
                event: "Boulder Founded",
                relatedLocations: [1]
            },
            {
                year: 1876,
                event: "Colorado Statehood",
                relatedLocations: [0, 1]
            },
            {
                year: 1915,
                event: "Rocky Mountain NP Established",
                relatedLocations: [2]
            },
            {
                year: 2024,
                event: "Present Day",
                relatedLocations: [0, 1, 2]
            }
        ];

        // Store marker objects
        var markers = {};
        var markerObjects = [];

        // Add markers to the map
        locations.forEach(function(location, index) {
            var popupContent = '<strong>' + location.name + '</strong><br>' + location.description + '<br><img src="' + location.image + '" width="100" />';
            var marker = L.marker(location.coords).addTo(map).bindPopup(popupContent);
            markers[index] = marker;
            markerObjects.push({
                index: index,
                marker: marker,
                location: location
            });
        });

        // Function to highlight markers based on timeline event
        function highlightMarkers(eventIndex) {
            // Clear all popups and reset markers
            markerObjects.forEach(function(obj) {
                obj.marker.closePopup();
                obj.marker.setOpacity(0.5);
            });

            // Highlight related markers
            var event = timelineEvents[eventIndex];
            event.relatedLocations.forEach(function(locationIndex) {
                markers[locationIndex].setOpacity(1);
                markers[locationIndex].openPopup();
            });

            // Update timeline UI
            var timelineItems = document.querySelectorAll('.timeline-item');
            timelineItems.forEach(function(item, index) {
                item.classList.remove('active');
            });
            timelineItems[eventIndex].classList.add('active');
        }

        // Build timeline UI
        var timelineContainer = document.getElementById('timeline');
        timelineEvents.forEach(function(event, index) {
            var timelineItem = document.createElement('div');
            timelineItem.className = 'timeline-item';
            if (index === 0) timelineItem.classList.add('active');
            
            timelineItem.innerHTML = 
                '<div class="dot"></div>' +
                '<div class="year">' + event.year + '</div>' +
                '<div class="event">' + event.event + '</div>'; 
            
            timelineItem.addEventListener('click', function() {
                highlightMarkers(index);
            });

            timelineContainer.appendChild(timelineItem);
        });

        // Initialize with first event highlighted
        highlightMarkers(0);

        // Optional: Scroll detection for timeline progression
        var currentEventIndex = 0;
        window.addEventListener('wheel', function(e) {
            if (e.deltaY > 0 && currentEventIndex < timelineEvents.length - 1) {
                // Scrolling down
                currentEventIndex++;
                highlightMarkers(currentEventIndex);
            } else if (e.deltaY < 0 && currentEventIndex > 0) {
                // Scrolling up
                currentEventIndex--;
                highlightMarkers(currentEventIndex);
            }
        }, { passive: true });
    </script>
</body>
</html>
