<!DOCTYPE html>
<html>
<head>
    <title>Colorado Interactive Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
        }
    </style>
</head>
<body>
    <h1>Colorado Interactive Map</h1>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the map
        var map = L.map('map').setView([39.5501, -105.7821], 7);

        // Add a tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // Define marker locations
        var locations = [
            {
                name: "Denver",
                description: "The capital city of Colorado.",
                image: "https://example.com/images/denver.jpg",
                coords: [39.7392, -104.9903]
            },
            {
                name: "Boulder",
                description: "Known for its beautiful scenery and outdoor activities.",
                image: "https://example.com/images/boulder.jpg",
                coords: [40.0150, -105.2705]
            },
            {
                name: "Rocky Mountain National Park",
                description: "A stunning national park with breathtaking views.",
                image: "https://example.com/images/rocky_mountain.jpg",
                coords: [40.3428, -105.6836]
            }
        ];

        // Add markers to the map
        locations.forEach(function(location) {
            var popupContent = '<strong>' + location.name + '</strong><br>' + location.description + '<br><img src="' + location.image + '" width="100" />';
            L.marker(location.coords).addTo(map).bindPopup(popupContent);
        });
    </script>
</body>
</html>
